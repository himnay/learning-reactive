server:
  port: 8082

spring:
  application:
    name: spring-reactive-service-movies
  profiles:
    active: local
  webflux:
    base-path: /

movies:
  url:
    movieInfo: http://localhost:8080/v1/movieInfo
    reviews: http://localhost:8081/v1/reviews

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: ${spring.application.name}
    description: Aggregates MovieInfo and Reviews into a single Movie response
    version: 0.0.1-SNAPSHOT

logging:
  level:
    com.reactivespring: INFO
    org.springframework.web.reactive: WARN
