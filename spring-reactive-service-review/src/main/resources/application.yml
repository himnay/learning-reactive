server:
  port: 8081

spring:
  application:
    name: spring-reactive-service-review
  profiles:
    active: local
---
spring:
  config:
    activate:
      on-profile: local
  data:
    mongodb:
      host: localhost
      port: 27017
      database: local

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: ${spring.application.name}
    description: Reactive Reviews Service with functional router/handler and Sinks SSE streaming
    version: 0.0.1-SNAPSHOT

logging:
  level:
    com.reactivespring: INFO
